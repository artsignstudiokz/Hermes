name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.1) — without leading 'v'"
        required: true

jobs:
  windows:
    name: Build Windows .exe + installer
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend + desktop deps
        run: |
          python -m pip install --upgrade pip
          pip install -e backend[desktop]
          pip install pyinstaller pillow

      - name: Install frontend
        working-directory: frontend
        run: npm install

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      - name: Generate icon assets
        run: python scripts/generate_icons.py
        continue-on-error: true       # icons may already be in repo

      - name: PyInstaller bundle
        run: pyinstaller --noconfirm --clean packaging/pyinstaller/hermes.spec

      - name: Set up Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        run: iscc packaging\windows\installer.iss

      - name: Stable-named copy (for landing's permanent URL)
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist\installer\Hermes-Setup-*.exe | Select-Object -First 1
          Copy-Item $installer.FullName dist\installer\Hermes-Setup.exe

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          .\scripts\compute_hashes.ps1
          Get-Content dist\SHA256SUMS.txt

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-windows
          path: |
            dist/Hermes.exe
            dist/installer/Hermes-Setup-*.exe
            dist/installer/Hermes-Setup.exe
            dist/SHA256SUMS.txt

  macos:
    name: Build macOS .app + .pkg
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend + desktop deps
        run: |
          python -m pip install --upgrade pip
          pip install -e backend[desktop]
          pip install pyinstaller pillow

      - name: Install frontend
        working-directory: frontend
        run: npm install

      - name: Build .app + .pkg
        run: |
          chmod +x packaging/macos/build_app.sh packaging/macos/build_pkg.sh scripts/build_release_macos.sh
          bash scripts/build_release_macos.sh

      - name: Zip Hermes.app for distribution
        run: |
          cd dist
          zip -r -y Hermes.app.zip Hermes.app

      - name: Stable-named copy (for landing's permanent URL)
        run: |
          src=$(ls dist/installer/Hermes-*.pkg | head -n1)
          cp "$src" dist/installer/Hermes.pkg

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          {
            echo "# Hermes — SHA-256 checksums (macOS build)"
            echo "# Verify before installing:"
            echo "#   shasum -a 256 <file>"
            echo ""
            for f in Hermes.app.zip installer/*.pkg; do
              if [ -f "$f" ]; then
                hash=$(shasum -a 256 "$f" | awk '{print $1}')
                size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f")
                echo "$hash  $f  ($size bytes)"
              fi
            done
          } > SHA256SUMS-macos.txt
          cat SHA256SUMS-macos.txt

      - name: Bundle helper script
        run: cp packaging/macos/unblock-hermes.command dist/

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-macos
          path: |
            dist/Hermes.app.zip
            dist/installer/Hermes-*.pkg
            dist/installer/Hermes.pkg
            dist/SHA256SUMS-macos.txt
            dist/unblock-hermes.command

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Hermes ${{ github.ref_name }}
          body: |
            ## Hermes ${{ github.ref_name }}

            By BAI Core — [baicore.kz](https://baicore.kz)

            ### Скачать
            - **Windows** · `Hermes-Setup-${{ github.ref_name }}.exe`
            - **macOS** · `Hermes-${{ github.ref_name }}.pkg`
              + `unblock-hermes.command` — двойной клик после установки, чтобы macOS разрешил запуск

            ### Если ОС предупреждает о неизвестном разработчике
            Это нормально для несигнованных сборок. SHA-256 хеши прилагаются — можно
            проверить целостность файла:

            **Windows** (PowerShell):
            ```
            Get-FileHash Hermes-Setup-${{ github.ref_name }}.exe -Algorithm SHA256
            ```
            и сравнить с содержимым `SHA256SUMS.txt`.

            **macOS:**
            ```
            shasum -a 256 Hermes-${{ github.ref_name }}.pkg
            ```
            и сравнить с `SHA256SUMS-macos.txt`.

            **Windows SmartScreen** → «Подробнее» → «Запустить в любом случае».
            **macOS Gatekeeper** → System Settings → Privacy & Security → "Open Anyway",
            или запустите `unblock-hermes.command` (снимает quarantine attribute).

            После установки откройте приложение и пройдите Onboarding (3 шага).

            Полное руководство: [USER_GUIDE_RU.md](https://github.com/${{ github.repository }}/blob/main/docs/USER_GUIDE_RU.md)
          files: |
            artefacts/hermes-windows/installer/Hermes-Setup-*.exe
            artefacts/hermes-windows/installer/Hermes-Setup.exe
            artefacts/hermes-windows/Hermes.exe
            artefacts/hermes-windows/SHA256SUMS.txt
            artefacts/hermes-macos/installer/Hermes-*.pkg
            artefacts/hermes-macos/installer/Hermes.pkg
            artefacts/hermes-macos/Hermes.app.zip
            artefacts/hermes-macos/SHA256SUMS-macos.txt
            artefacts/hermes-macos/unblock-hermes.command
          draft: false
          prerelease: false
