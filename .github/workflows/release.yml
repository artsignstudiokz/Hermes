name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.1) — without leading 'v'"
        required: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Windows job is the priority — must succeed for a usable release.
  # ──────────────────────────────────────────────────────────────────────
  windows:
    name: Build Windows .exe + installer
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Install pyproject deps first.
          pip install --prefer-binary -e "backend[desktop]"
          # Belt-and-suspenders: explicit install of every critical package.
          # If pyproject extras resolution had any quirk, these guarantee deps land.
          pip install --prefer-binary `
            "httpx>=0.27,<1.0" `
            "uvicorn[standard]>=0.32,<1.0" `
            "fastapi>=0.115,<1.0" `
            "pydantic>=2.9,<3.0" `
            "pydantic-settings>=2.6,<3.0" `
            "sqlalchemy>=2.0,<3.0" `
            "aiosqlite>=0.20,<1.0" `
            "alembic>=1.13,<2.0" `
            "cryptography>=43.0,<46.0" `
            "argon2-cffi>=23.1,<25.0" `
            "pyjwt[crypto]>=2.9,<3.0" `
            "python-multipart>=0.0.20,<1.0" `
            "platformdirs>=4.3,<5.0" `
            "websockets>=13.1,<15.0" `
            "python-dateutil>=2.9,<3.0" `
            "apscheduler>=3.10,<4.0" `
            "slowapi>=0.1.9,<1.0" `
            "pandas>=2.2,<3.0" `
            "numpy>=1.26,<3.0" `
            "scipy>=1.13,<2.0" `
            "optuna>=4.0,<5.0" `
            "ccxt>=4.4,<5.0" `
            "pywebpush>=2.0,<3.0" `
            "qrcode[pil]>=8.0,<9.0" `
            "pyngrok>=7.2,<8.0" `
            "MetaTrader5>=5.0.45" `
            "pywebview>=5.3,<6.0" `
            "win10toast>=0.9"
          pip install pyinstaller pillow

      - name: Verify all critical deps installed (FAIL build if missing)
        shell: pwsh
        run: |
          Write-Host "=== pip list (excerpt) ==="
          pip list | Select-String -Pattern "httpx|fastapi|uvicorn|pydantic|sqlalchemy|aiosqlite|alembic|cryptography|argon2|pyjwt|multipart|platformdirs|websockets|apscheduler|slowapi|pandas|numpy|scipy|optuna|ccxt|pywebpush|qrcode|pyngrok|MetaTrader|pywebview|win10toast"
          Write-Host ""
          Write-Host "=== Import check (CRITICAL — build fails if any module missing) ==="
          $critical = @("httpx", "platformdirs", "uvicorn", "fastapi", "pydantic", "pydantic_settings",
                        "argon2", "ccxt", "webview", "sqlalchemy", "aiosqlite", "alembic",
                        "pywebpush", "qrcode", "apscheduler", "scipy", "pandas", "numpy",
                        "optuna", "cryptography", "jwt", "websockets", "MetaTrader5")
          $failed = @()
          foreach ($m in $critical) {
            $check = python -c "import $m; print(getattr($m, '__version__', '?'))" 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  OK    $m  $check"
            } else {
              Write-Host "  FAIL  $m  -> $check"
              $failed += $m
            }
          }
          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "Critical packages failed to import:"
            $failed | ForEach-Object { Write-Host "  - $_" }
            Write-Error "Build aborted — bundle would be incomplete without these packages."
            exit 1
          }
          Write-Host ""
          Write-Host "All critical packages import OK — safe to bundle."

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      - name: Generate icon assets
        run: python scripts/generate_icons.py
        continue-on-error: true

      - name: Generate license.rtf (encoding-safe)
        run: python scripts/generate_license_rtf.py

      - name: PyInstaller bundle
        run: pyinstaller --noconfirm --clean packaging/pyinstaller/hermes.spec

      - name: Verify PyInstaller bundle (filesystem check)
        shell: pwsh
        run: |
          # onedir layout: dist/Hermes/Hermes.exe + dist/Hermes/_internal/* (libs)
          $exe = "dist\Hermes\Hermes.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "PyInstaller did not produce $exe"
            exit 1
          }
          $folderSize = [math]::Round((Get-ChildItem dist\Hermes -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "Hermes/ folder size: $folderSize MB"

          # ── Filesystem verification ───────────────────────────────────────
          # PyInstaller "Failed to execute script" pop-up keeps the process
          # alive past any timeout, so smoke-tests give false positives. The
          # only reliable check is: did PyInstaller actually copy the package
          # into _internal/? If httpx/ is missing as a folder, the bundle is
          # broken regardless of what `pip list` showed.
          $internalDir = "dist\Hermes\_internal"
          if (-not (Test-Path $internalDir)) {
            Write-Error "_internal/ folder missing — PyInstaller did not produce a valid onedir bundle."
            exit 1
          }
          Write-Host ""
          Write-Host "=== Verifying critical packages bundled into _internal/ ==="
          # Each entry is "module-name | path-glob-under-_internal".
          # Some packages flatten to a single .pyd (PIL→PIL/, jwt→jwt/) while
          # others ship as proper packages — we glob to handle both.
          $required = @(
            @{Name = "httpx";             Path = "httpx"},
            @{Name = "httpcore";          Path = "httpcore"},
            @{Name = "fastapi";           Path = "fastapi"},
            @{Name = "starlette";         Path = "starlette"},
            @{Name = "uvicorn";           Path = "uvicorn"},
            @{Name = "pydantic";          Path = "pydantic"},
            @{Name = "pydantic_core";     Path = "pydantic_core"},
            @{Name = "sqlalchemy";        Path = "sqlalchemy"},
            @{Name = "aiosqlite";         Path = "aiosqlite"},
            @{Name = "alembic";           Path = "alembic"},
            @{Name = "cryptography";      Path = "cryptography"},
            @{Name = "argon2";            Path = "argon2"},
            @{Name = "jwt";               Path = "jwt"},
            @{Name = "platformdirs";      Path = "platformdirs"},
            @{Name = "websockets";        Path = "websockets"},
            @{Name = "apscheduler";       Path = "apscheduler"},
            @{Name = "pandas";            Path = "pandas"},
            @{Name = "numpy";             Path = "numpy"},
            @{Name = "scipy";             Path = "scipy"},
            @{Name = "ccxt";              Path = "ccxt"},
            @{Name = "optuna";            Path = "optuna"},
            @{Name = "pywebpush";         Path = "pywebpush"},
            @{Name = "qrcode";            Path = "qrcode"},
            @{Name = "PIL";               Path = "PIL"},
            @{Name = "webview";           Path = "webview"}
          )
          $missing = @()
          foreach ($pkg in $required) {
            $full = Join-Path $internalDir $pkg.Path
            if (Test-Path $full) {
              $count = (Get-ChildItem $full -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
              Write-Host ("  OK    {0,-20} ({1} files in _internal\{2}\)" -f $pkg.Name, $count, $pkg.Path)
            } else {
              Write-Host ("  MISS  {0,-20} (expected _internal\{1}\)" -f $pkg.Name, $pkg.Path)
              $missing += $pkg.Name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host ""
            Write-Host "PyInstaller did not bundle these critical packages:"
            $missing | ForEach-Object { Write-Host "  - $_" }
            Write-Host ""
            Write-Host "=== _internal/ contents (top-level dirs) ==="
            Get-ChildItem $internalDir -Directory | Select-Object -First 50 | ForEach-Object { Write-Host "  $($_.Name)" }
            Write-Error "Bundle incomplete — release would crash on user machine."
            exit 1
          }
          Write-Host ""
          Write-Host "=== Bundle size sanity check ==="
          if ($folderSize -lt 80) {
            Write-Warning "Hermes folder is $folderSize MB — expected 100-300 MB with full deps. Possible silent collect_all failure."
          } else {
            Write-Host "Hermes folder size $folderSize MB — looks healthy."
          }
          Write-Host ""
          Write-Host "All critical packages bundled. Bundle verified."

      - name: Zip Hermes folder for portable distribution
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Hermes\*" -DestinationPath "dist\Hermes-Windows-Portable.zip" -Force
          $size = (Get-Item "dist\Hermes-Windows-Portable.zip").Length / 1MB
          Write-Host "Portable zip size: $([math]::Round($size, 1)) MB"

      - name: Set up Inno Setup
        run: choco install innosetup -y --no-progress
        continue-on-error: true

      - name: Build installer (Inno Setup)
        id: inno
        shell: pwsh
        run: |
          if (Get-Command iscc -ErrorAction SilentlyContinue) {
            iscc packaging\windows\installer.iss
            if (Test-Path "dist\installer\Hermes-Setup-*.exe") {
              $installer = Get-ChildItem dist\installer\Hermes-Setup-*.exe | Select-Object -First 1
              Write-Host "Built installer: $($installer.FullName) ($([math]::Round($installer.Length / 1MB, 1)) MB)"
            }
          } else {
            Write-Warning "Inno Setup not available — falling back to portable zip as Hermes-Setup.exe."
            New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
            # Self-extracting fallback: just copy the zip under the installer name. Crude but functional.
            Copy-Item "dist\Hermes-Windows-Portable.zip" "dist\installer\Hermes-Setup.exe" -Force
          }
        continue-on-error: true

      - name: Stable-named installer copy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
          $installer = Get-ChildItem dist\installer\Hermes-Setup-*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName "dist\installer\Hermes-Setup.exe" -Force
          }

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $files = @(
            "dist\Hermes-Windows-Portable.zip",
            "dist\installer\Hermes-Setup.exe"
          )
          $lines = @("# Hermes — SHA-256 checksums (Windows build)", "")
          foreach ($f in $files) {
            if (Test-Path $f) {
              $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
              $size = (Get-Item $f).Length
              $lines += "$hash  $f  ($size bytes)"
            }
          }
          $lines | Set-Content "dist\SHA256SUMS.txt" -Encoding ASCII
          Get-Content "dist\SHA256SUMS.txt"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-windows
          path: |
            dist/Hermes-Windows-Portable.zip
            dist/installer/Hermes-Setup-*.exe
            dist/installer/Hermes-Setup.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────
  # macOS job is best-effort — its failure does NOT block the release.
  # ──────────────────────────────────────────────────────────────────────
  macos:
    name: Build macOS .app + .pkg
    runs-on: macos-latest
    timeout-minutes: 35
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -e "backend[desktop]"
          pip install pyinstaller pillow

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build .app + .pkg
        run: |
          chmod +x packaging/macos/build_app.sh packaging/macos/build_pkg.sh scripts/build_release_macos.sh
          bash scripts/build_release_macos.sh

      - name: Zip Hermes.app
        run: |
          if [ -d dist/Hermes.app ]; then
            cd dist && zip -r -y Hermes.app.zip Hermes.app
          fi

      - name: Stable-named copy
        run: |
          mkdir -p dist/installer
          src=$(ls dist/installer/Hermes-*.pkg 2>/dev/null | head -n1 || true)
          if [ -n "$src" ]; then
            cp "$src" dist/installer/Hermes.pkg
          fi

      - name: Compute SHA-256 checksums
        run: |
          {
            echo "# Hermes — SHA-256 checksums (macOS build)"
            echo ""
            for f in dist/Hermes.app.zip dist/installer/*.pkg; do
              if [ -f "$f" ]; then
                hash=$(shasum -a 256 "$f" | awk '{print $1}')
                size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f")
                echo "$hash  $f  ($size bytes)"
              fi
            done
          } > dist/SHA256SUMS-macos.txt
          cat dist/SHA256SUMS-macos.txt

      - name: Bundle helper script
        run: cp packaging/macos/unblock-hermes.command dist/ || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-macos
          path: |
            dist/Hermes.app.zip
            dist/installer/Hermes-*.pkg
            dist/installer/Hermes.pkg
            dist/SHA256SUMS-macos.txt
            dist/unblock-hermes.command
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────
  # Release job runs even if macOS failed — Windows artefacts are required,
  # macOS artefacts are optional.
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.windows.result == 'success'
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artefacts
        uses: actions/download-artifact@v4
        with:
          name: hermes-windows
          path: artefacts/windows

      - name: Download macOS artefacts (best-effort)
        uses: actions/download-artifact@v4
        with:
          name: hermes-macos
          path: artefacts/macos
        continue-on-error: true

      - name: List artefacts (debug)
        run: |
          echo "=== Windows ==="
          find artefacts/windows -type f 2>/dev/null || echo "no windows artefacts"
          echo "=== macOS ==="
          find artefacts/macos -type f 2>/dev/null || echo "no macos artefacts"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Hermes ${{ github.ref_name }}
          body: |
            ## Hermes ${{ github.ref_name }}

            By BAI Core — [baicore.kz](https://baicore.kz)

            ### Скачать

            **Windows**
            - `Hermes-Setup.exe` — установщик с wizard'ом
            - `Hermes.exe` — портативная версия (без установки)
            - `Hermes-Windows-Portable.zip` — портативный архив

            **macOS** (если CI собрался)
            - `Hermes.pkg` — установщик для /Applications
            - `Hermes.app.zip` — портативный архив
            - `unblock-hermes.command` — снимает quarantine attribute

            ### Если ОС предупреждает о неизвестном разработчике
            **Windows SmartScreen** → «Подробнее» → «Запустить в любом случае».
            **macOS Gatekeeper** → запустите `unblock-hermes.command`,
            или System Settings → Privacy & Security → "Open Anyway".

            SHA-256 хеши прилагаются в `SHA256SUMS.txt` (Windows) и `SHA256SUMS-macos.txt`.

            Полное руководство: [USER_GUIDE_RU.md](https://github.com/${{ github.repository }}/blob/main/docs/USER_GUIDE_RU.md)
          files: |
            artefacts/windows/Hermes.exe
            artefacts/windows/Hermes-Windows-Portable.zip
            artefacts/windows/installer/Hermes-Setup-*.exe
            artefacts/windows/installer/Hermes-Setup.exe
            artefacts/windows/SHA256SUMS.txt
            artefacts/macos/Hermes.app.zip
            artefacts/macos/installer/Hermes-*.pkg
            artefacts/macos/installer/Hermes.pkg
            artefacts/macos/SHA256SUMS-macos.txt
            artefacts/macos/unblock-hermes.command
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
