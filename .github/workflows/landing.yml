name: Landing — preview build

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing.yml"
  pull_request:
    paths:
      - "landing/**"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm install
      - run: npm run build

      - name: Upload preview
        uses: actions/upload-artifact@v4
        with:
          name: hermes-landing
          path: landing/dist
