[pytest]
testpaths = tests
asyncio_mode = auto
# Required since pytest-asyncio 0.23 — older auto-loop fixture is
# deprecated and asyncio.get_event_loop() no longer creates one
# automatically on Python 3.10+, which manifests in CI as
# "RuntimeError: There is no current event loop in thread 'MainThread'."
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::pydantic.PydanticDeprecatedSince20
addopts = -ra -q --tb=short
